version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: "pip"
    directory: "/build-project"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
